      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
      responses:
        '200':
          description: Позиции товара по ключевым словам
          content:
            application/json:
              example:
                - query: футболки с длинным рукавом женские
                  count: 128
                  total: 0
                  avg_position: 1
                  positions:
                    - 1
                    - 2
                    - 3
                - query: футболка мужская принт
                  count: 118
                  total: 0
                  avg_position: 1
                  positions:
                    - null
                    - null
                    - 1
                - query: футболка модная
                  count: 104
                  total: 0
                  avg_position: 1
                  positions:
                    - null
                    - 2
                    - null
  /items/{id}/by_period:
    get:
      summary: Статистика товара за период
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
        - name: fbs
          in: query
          description: Включить в отчёт данные по FBS-товарам
          required: false
          example: false
          schema:
            type: boolean
        - name: withSearchStats
          in: query
          description: Включить в отчёт данные позициям, видимости, трафику
          required: false
          example: false
          schema:
            type: boolean
      responses:
        '200':
          description: Данные по дням
          content:
            application/json:
              example:
                - no_data: 0
                  data: '2026-03-05'
                  balance: 54
                  sales: 0
                  rating: 4.9
                  price: 100000
                  final_price: 76501
                  ozon_card_price: 73763
                  is_bestseller: 0
                  is_new: 0
                  comments: 3134
                  discount: 23
                - no_data: 0
                  data: '2026-03-04'
                  balance: 54
                  sales: 2
                  rating: 4.9
                  price: 100000
                  final_price: 76718
                  ozon_card_price: 73767
                  is_bestseller: 0
                  is_new: 0
                  comments: 3132
                  discount: 23
  /items/{id}/by_day:
    get:
      summary: Статистика товара за день
      tags:
