      summary: Позиции товара в категориях
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
      responses:
        '200':
          description: Позиции товара по категориям
          content:
            application/json:
              example:
                - name: >-
                    Одежда/Женская одежда/Футболки и топы женские/Футболки и
                    поло женские
                  positions:
                    - 595
                    - 641
                    - 713
                    - null
                    - 14
                - name: Одежда/Мужская одежда
                  positions:
                    - 1598
                    - 911
                    - 1000
                    - 880
                    - 334
  /items/{id}/keywords:
    get:
      summary: Запросы и позиции по ключевым словам товара
      tags:
