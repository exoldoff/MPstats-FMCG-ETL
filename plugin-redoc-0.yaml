  /brand/feedback/comments/ai_recommendations:
    get:
      summary: AI рекомендации по отзывам на товары бренда
      tags:
        - brand
      parameters:
        - name: path
          in: query
          description: Название бренда
          required: true
          example: Xiaomi
          schema:
            type: string
      responses:
        '200':
          description: AI рекомендации
          content:
            application/json:
              example:
                id: 19b36ac20ac2970db60f113c23c27a76
                status: 10
                data:
                  pain_points:
                    - topic: Просвечивание ткани
                      description: >-
                        Покупатели жалуются, что материал топа слишком тонкий и
                        сильно просвечивает, что делает изделие непригодным для
                        ношения без подкладки.
                      solution: >-
                        Использовать более плотную или многослойную ткань,
                        протестировать материал на просвечивание при разных
                        условиях освещения.
                    - topic: Несоответствие цены качеству
                      description: >-
                        Клиенты отмечают, что качество изделия не оправдывает
                        его стоимости, что снижает доверие к бренду.
                      solution: >-
                        Провести анализ себестоимости и уровня восприятия цены,
                        возможно, скорректировать цену или повысить качество
                        материалов и пошива.
                    - topic: Разочарование ожиданий
                      description: >-
                        Отзыв с низкой оценкой указывает, что товар не
                        соответствует ожиданиям пользователя по изображению или
                        описанию.
                      solution: >-
                        Пересмотреть описание и фотографии товара, добавить
                        реальные фото на модели при разном освещении и в разных
                        позах.
                  advantages:
                    - topic: Современный дизайн
                      description: >-
                        Из отзыва следует, что изделие привлекательно визуально
                        (есть интерес к покупке топа несмотря на недостатки).
                      solution: >-
                        Сохранить стиль, но усилить функциональность за счёт
                        выбора качественных материалов.
                    - topic: Лёгкость материала
                      description: >-
                        Ткань, вероятно, тонкая и приятная на ощупь, что оценят
                        в жаркое время года.
                      solution: >-
                        Оставить лёгкость как характеристику, но добавить
                        плотную подкладку или продумать двойной слой в зонах,
                        где просвечивание критично.
                    - topic: Минималистичный стиль
                      description: >-
                        Топ, судя по отзыву, имеет простой дизайн, что
                        соответствует модным трендам.
                      solution: >-
                        Подчеркнуть минимализм в маркетинговых материалах, делая
                        акцент на универсальности и сочетании с другими вещами.
