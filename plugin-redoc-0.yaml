          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: date
          in: query
          description: Дата отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
      responses:
        '200':
          description: Данные за день
          content:
            application/json:
              example:
                - tm: '00:02'
                  comments: 3096
                  rating: 490
                  balance: 64
                  balancefbs: 0
                  sales: 0
                  salesfbs: 0
                  price: 100000
                  final_price: 75078
                  ozon_card_price: 72049
                - tm: '01:00'
                  comments: 3096
                  rating: 490
                  balance: 64
                  balancefbs: 0
                  sales: 0
                  salesfbs: 0
                  price: 100000
                  final_price: 75078
                  ozon_card_price: 72049
                - tm: '02:00'
                  comments: 3096
                  rating: 490
                  balance: 64
                  balancefbs: 0
                  sales: 0
                  salesfbs: 0
                  price: 100000
                  final_price: 75078
                  ozon_card_price: 72049
                - tm: '03:03'
                  comments: 3096
                  rating: 490
                  balance: 64
                  balancefbs: 0
                  sales: 0
                  salesfbs: 0
                  price: 100000
                  final_price: 75078
                  ozon_card_price: 72049
  /items/{id}/search_stats:
    get:
      summary: Статистика позиций, видимости и трафика товара за период
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
      responses:
        '200':
          description: Данные за период в сравнении с предыдущим
          content:
            application/json:
              example:
                search_visibility: 1325
                search_visibility_previous: 1502
                search_words_count: 1376
                search_words_count_previous: 1556
                search_position_avg: 43
                search_position_avg_previous: 45
                oz_count: 205700
                oz_count_previous: 93758
  /items/{id}/sales:
    get:
      summary: Статистика продаж товара за период по складам
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
        - name: fbs
          in: query
          description: Включить в отчёт данные по FBS-товарам
          required: false
          example: false
          schema:
            type: boolean
      responses:
        '200':
          description: Данные по продажам по складам
          content:
            application/json:
              example:
                - store_id: '1020001853819000'
                  store_name: ПЕРМЬ_РФЦ
                  sales: 662
                - store_id: '1020001649180000'
                  store_name: СПБ_КОЛПИНО_РФЦ
