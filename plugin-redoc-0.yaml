  /niche/list:
    post:
      summary: Список ниш (выбор ниши)
      description: >
        [Документация по параметрам тела
        запроса](/integrations/docs/body-parameters)
      tags:
        - niche
      parameters:
        - name: type
          in: query
          description: Необходимы тип данных (csv, xls, json по умолчанию)
          required: false
          example: json
          schema:
            type: string
        - name: date
          in: query
          description: Дата
          required: false
          example: '2025-02-01'
          schema:
            type: string
        - name: fbs
          in: query
          description: Учитывать данные по FBS-товарам
          required: false
          example: 1
          schema:
            type: boolean
        - name: onlyFavorite
          in: query
          description: Только избранные
          required: false
          example: 1
          schema:
            type: boolean
        - name: search
          in: query
          description: Поисковый запрос
          required: false
          example: Телевизоры
          schema:
            type: string
        - name: currency
          in: query
          description: Пересчёт в валюту / Название валюты (по умолчанию "RUB")
          required: false
          example: USD
          schema:
            type: string
        - name: currency_rate
          in: query
          description: Пересчёт в валюту / Курс
          required: false
          example: 100
          schema:
            type: integer
        - name: startRow
          in: query
          description: >-
            С какой строки вернуть данные (пагинация - "от .."). По умолчанию,
            0.
          required: false
          example: 100
          schema:
            type: integer
        - name: endRow
          in: query
          description: >-
