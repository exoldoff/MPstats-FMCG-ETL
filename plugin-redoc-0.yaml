components:
  schemas:
    item:
      type: object
      properties:
        id:
          description: ID (SKU) товара
          type: integer|string
        name:
          description: Название товара
          type: string
        brand:
          description: Бренд
          type: object
          properties:
            id:
              description: ID бренда
              type: integer
            name:
              description: Название бренда
              type: string
        seller:
          description: Продавец
          type: object
          properties:
            id:
              description: ID продавца
              type: integer
            name:
              description: Название продавца
              type: string
        thumb:
          description: Ссылка на картинку
          type: string
    groups:
      type: object
      properties:
        groups:
          description: Список групп
          type: array
          items:
            type: object
            properties:
              id:
                description: ID группы
                type: integer
              name:
                description: Название группы
                type: string
        defaultGroup:
          description: ID группы по умолчанию
          type: integer
    groups.put:
      type: object
      properties:
        success:
          description: Статус операции
          type: boolean
        id:
          description: ID новой группы
          type: integer
    groups.stats:
      type: array
      items:
        type: object
        properties:
          id:
            description: ID группы
            type: integer
          name:
            description: Название группы
            type: string
          created:
            description: Дата создания
            type: string
          updated:
            description: Дата обновления
            type: string
          on_main:
            description: Наличие на главной
            type: boolean
          archived:
            description: Группа в архиве
            type: boolean
          items_count:
            description: Количество товаров в группе
            type: integer
          items_count_in_period:
            description: Количество товаров в группе за период
            type: integer
          sales:
            description: Продажи в группе
            type: integer
          revenue:
            description: Выручка в группе
            type: integer
          count_brands:
            description: Количество брендов в группе
            type: integer
          count_sellers:
            description: Количество продавцов в группе
            type: integer
          graph:
            description: График продаж в группе
            type: array
            items:
              type: integer
    groups.id:
      type: object
      properties:
        id:
          description: ID группы
          type: integer
        name:
          description: Название группы
          type: string
        created:
          description: Дата создания
          type: string
        updated:
          description: Дата обновления
          type: string
        on_main:
          description: Наличие на главной
          type: boolean
        archived:
          description: Группа в архиве
          type: boolean
    success:
      type: object
      properties:
        success:
          description: Успешность операции
          type: boolean
