          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: date
          in: query
          description: Дата отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: fbs
          in: query
          description: Включить в отчёт данные по FBS-товарам
          required: false
          example: false
          schema:
            type: boolean
      responses:
        '200':
          description: Данные по наличию товара по складам
          content:
            application/json:
              example:
                - store_id: '1020001853819000'
                  store_name: ПЕРМЬ_РФЦ
                  balance: 175
                - store_id: '1020001351243000'
                  store_name: НЕВИННОМЫССК_РФЦ
                  balance: 150
  /items/{id}/stores:
    get:
      summary: Данные по продажам и остаткам товара за период по складам
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
        - name: fbs
          in: query
          description: Включить в отчёт данные по FBS-товарам
          required: false
          example: false
          schema:
            type: boolean
      responses:
        '200':
          description: Данные по продажам и остаткам по дням по складам
          content:
            application/json:
              example:
                - store_id: '1020000241710000'
                  store_name: СОФЬИНО_РФЦ
                  stats:
                    - date: '2026-02-01'
                      sales: 1
                      balance: 1
                    - date: '2026-02-02'
                      sales: 2
                      balance: 2
                - store_id: '1020000267736000'
                  store_name: АДЫГЕЙСК_РФЦ
                  stats:
                    - date: '2026-02-01'
                      sales: 100
                      balance: 50
                    - date: '2026-02-02'
                      sales: 10
                      balance: 40
  /items/{id}/comments:
    get:
      summary: Получение комментариев (оценок) по товару
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 86972
          schema:
            type: integer
      responses:
        '200':
          description: Комментарии (оценки) по товару
          content:
            application/json:
              example:
                - date: '2025-11-29'
                  valuation: 5
                  likes: 0
                  text: ''
                - date: '2025-11-25'
                  valuation: 5
                  likes: 0
                  text: ''
                - date: '2025-10-31'
                  valuation: 5
                  likes: 0
                  text: Хороший журнальчик. Интерес у ребёнка вызывает
  /items/{id}/comments/ai_recommendations:
    get:
      summary: AI рекомендации по отзывам на товар
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 86972
          schema:
            type: integer
      responses:
        '200':
          description: AI рекомендации
          content:
            application/json:
              example:
                id: 19b36ac20ac2970db60f113c23c27a76
                status: 10
                data:
                  pain_points:
                    - topic: Просвечивание ткани
                      description: >-
                        Покупатели жалуются, что материал топа слишком тонкий и
                        сильно просвечивает, что делает изделие непригодным для
                        ношения без подкладки.
                      solution: >-
                        Использовать более плотную или многослойную ткань,
                        протестировать материал на просвечивание при разных
                        условиях освещения.
                    - topic: Несоответствие цены качеству
                      description: >-
                        Клиенты отмечают, что качество изделия не оправдывает
                        его стоимости, что снижает доверие к бренду.
                      solution: >-
                        Провести анализ себестоимости и уровня восприятия цены,
                        возможно, скорректировать цену или повысить качество
                        материалов и пошива.
                    - topic: Разочарование ожиданий
                      description: >-
                        Отзыв с низкой оценкой указывает, что товар не
                        соответствует ожиданиям пользователя по изображению или
                        описанию.
                      solution: >-
                        Пересмотреть описание и фотографии товара, добавить
                        реальные фото на модели при разном освещении и в разных
                        позах.
                  advantages:
                    - topic: Современный дизайн
                      description: >-
                        Из отзыва следует, что изделие привлекательно визуально
                        (есть интерес к покупке топа несмотря на недостатки).
                      solution: >-
                        Сохранить стиль, но усилить функциональность за счёт
                        выбора качественных материалов.
                    - topic: Лёгкость материала
                      description: >-
                        Ткань, вероятно, тонкая и приятная на ощупь, что оценят
                        в жаркое время года.
                      solution: >-
                        Оставить лёгкость как характеристику, но добавить
                        плотную подкладку или продумать двойной слой в зонах,
                        где просвечивание критично.
                    - topic: Минималистичный стиль
                      description: >-
                        Топ, судя по отзыву, имеет простой дизайн, что
                        соответствует модным трендам.
                      solution: >-
                        Подчеркнуть минимализм в маркетинговых материалах, делая
                        акцент на универсальности и сочетании с другими вещами.
  /items/{id}/versions:
    get:
      summary: Данные по версиям товара
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
      responses:
        '200':
          description: Данные по версиям товара
          content:
            application/json:
              example:
                - version: 73ae4b2b063d597cf4ec33a79c010cf7
                  date: '2026-02-11 21:10:29'
                - version: 35a7696cf2a4488ae016c98668b0cf64
                  date: '2026-02-04 14:59:59'
  /items/{id}/versions/{hash}:
    get:
      summary: Параметры версии товара
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: hash
          in: path
          description: Хеш версии
          required: true
          example: cd386e568a138467cb7e618160d7a3d2
          schema:
            type: string
      responses:
        '200':
          description: Параметры версии товара
          content:
            application/json:
              example:
                date: '2025-08-21 02:59:13'
                name: Футболка Import Store Premium
                description: >-
                  Мужская футболка из хлопка пенье | 100% хлопок | Брендовая
                  базовая футболка | Плотность 200 г/м²

                  Качественная базовая футболка для мужчин, которые ценят
                  комфорт и стиль

                  Выполнена из премиального хлопка пенье — мягкий, дышащий и
                  прочный материал с плотностью 200 г/м²

                  Футболка держит форму, не просвечивает, не теряет цвет после
                  стирки

                  Классический прямой крой подходит для любого типа фигуры и
                  легко сочетается с повседневной и спортивной одеждой

                  Подходит как для самостоятельной носки, так и для нанесения
