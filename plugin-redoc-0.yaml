        - name: id
          in: path
          description: ID группы
          required: true
          example: 565488
          schema:
            type: integer
      responses:
        '200':
          description: Результат
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success'
              example:
                success: true
    put:
      summary: Добавление товаров в группу
      description: >-
        Обязательно передавать хотя бы один из указанных параметров (skus /
        brands / sellers / keyword)
      tags:
        - groups
      parameters:
        - name: id
          in: path
          description: ID группы
          required: true
          example: 565488
          schema:
            type: integer
        - name: skus
          in: query
          description: Список SKU
          required: false
          example: 35995104, 153525562, 142257239
          schema:
            type: string
        - name: exceptSkus
          in: query
          description: Список исключённых SKU (которые не будут добавлены в группу)
          required: false
          schema:
            type: array
        - name: brands
          in: query
          description: Список брендов (названия)
          required: false
          example:
            - adidas
            - nike
          schema:
            type: array
            items:
              type: string
        - name: sellers
          in: query
          description: Список продавцов (id)
          required: false
          example:
            - 7
            - 8145
          schema:
            type: array
            items:
              type: string
        - name: keyword
          in: query
          description: Ключевое слово
          required: false
          example: кроссовки
          schema:
            type: string
        - name: filterModel
          in: query
          description: Фильтры по колонкам таблицы (как в методе POST /items)
          required: false
          schema:
            type: array
      responses:
        '201':
          description: Результат
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/success'
              example:
                success: true
