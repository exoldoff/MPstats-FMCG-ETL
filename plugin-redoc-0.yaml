openapi: 3.0.0
info:
  title: MPSTATS ANALYTICS API - Ozon
  version: 1.0.0
servers:
  - url: https://mpstats.io/api/analytics/v1/oz
    description: MPSTATS - Analytics
tags:
  - name: items
    x-displayName: Товары
  - name: niche
    x-displayName: Ниша
  - name: category
    x-displayName: Категория
  - name: seller
    x-displayName: Продавец
  - name: brand
    x-displayName: Бренд
  - name: identical
    x-displayName: Похожие товары
  - name: groups
    x-displayName: Группы
  - name: keywords
    x-displayName: Поисковые запросы
paths:
  /items:
    post:
      summary: Получение списка товаров по SKU / брендам / продавцу / ключевому слову
      description: >
        Обязательно передавать хотя бы один из указанных параметров. 
        [Документация по параметрам тела
        запроса](/integrations/docs/body-parameters)
      tags:
        - items
      parameters:
        - name: ids
          in: query
          description: Список SKU
          required: false
          example: 35995104, 153525562, 142257239
          schema:
            type: string
        - name: brands
          in: query
          description: Список брендов (названия)
          required: false
          example:
            - adidas
            - nike
          schema:
            type: array
            items:
              type: string
        - name: sellers
          in: query
          description: Список продавцов (названия)
          required: false
          example:
            - Адидасовый МИР
            - Raise
          schema:
            type: array
            items:
              type: string
        - name: keyword
          in: query
          description: Ключевое слово
          required: false
          example: кроссовки
          schema:
            type: string
        - name: d1
          in: query
          description: Дата начала периода поиска (по умолчанию, год назад)
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца периода поиска (по умолчанию, вчера)
          required: false
          example: '2025-01-31'
          schema:
            type: string
        - name: startRow
          in: query
          description: >-
            С какой строки вернуть данные (пагинация - "от .."). По умолчанию,
            0.
          required: false
          example: 100
          schema:
            type: integer
        - name: endRow
          in: query
          description: >-
            До какой строки вернуть данные (пагинация - "до .."). По умолчанию,
            100.
          required: false
          example: 200
          schema:
            type: integer
        - name: filterModel
          in: query
          description: Фильтры по колонкам таблицы
          required: false
          schema:
            type: array
        - name: sortModel
          in: query
          description: Сортировка данных по колонке и направлению
          required: false
          schema:
            type: array
      responses:
        '200':
          description: Список товаров
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/item'
              example:
                startRow: 0
                endRow: 10
                total: 5109
                data:
                  - id: 1569294852
                    name: Кроссовки adidas Original
                    brand:
                      id: 144082850
                      name: adidas
                    seller:
                      id: 1875517
                      name: Адидасовый МИР
                    thumb: https://cdn1.ozone.ru/s3/multimedia-1-d/7047589873.jpg
                  - id: 162314532
                    name: Кимоно adidas
                    brand:
                      id: 144082850
                      name: adidas
                    seller:
                      id: 8476
                      name: Combatmarkt
                    thumb: https://cdn1.ozone.ru/s3/multimedia-m/6315894946.jpg
                  - id: 1566243863
                    name: Кроссовки adidas
                    brand:
                      id: 144082850
                      name: adidas
                    seller:
                      id: 1982496
                      name: Raise
                    thumb: https://cdn1.ozone.ru/s3/multimedia-1-u/7020056082.jpg
  /items/{id}/full:
    get:
      summary: Получение подробной информации по товару
      tags:
        - items
      parameters:
        - name: id
          in: path
          description: ID товара
          required: true
          example: 1786874757
          schema:
            type: integer
        - name: d1
          in: query
          description: Дата начала отчёта
          required: false
          example: '2025-01-01'
          schema:
            type: string
        - name: d2
          in: query
          description: Дата конца отчёта
          required: false
          example: '2025-01-31'
          schema:
            type: string
        - name: fbs
          in: query
          description: Включить в отчёт данные по FBS-товарам
          required: false
          example: false
          schema:
            type: boolean
      responses:
        '200':
          description: Информация по товару
          content:
            application/json:
              example:
                id: 1786874757
                name: Футболка Import Store Premium
                link: https://ozon.ru/context/detail/id/1786874757
                niche:
                  id: 7508
                  name: >-
                    Одежда/Женская одежда/Футболки и топы женские/Футболки и
                    поло женские
                brand: Import Store
                seller:
                  id: 2496702
                  name: Import Store
                  is_best_seller: 0
                price:
                  price: 100000
                  final_price: 76501
                  ozon_card_price: 73763
                discount: 23
                balance: 54
                delivery_scheme: FBO
                rating: 4.9
                comments: 3134
                period_stats:
                  revenue: 2883091
                  revenue_avg: 93002.94
                  sales: 41
                  sales_avg: 1
                  revenue_avg_with_stock: 93003
                  sales_avg_with_stock: 1
                  revenue_potential: 2790088.06
                  lost_profit: -93002.94
                  lost_profit_percent: -3.33
                  revenue_prev: 33329
                  sales_prev: 73
                  sku_first_date: '1970-01-01'
                photo:
                  count: 4
                  list:
                    - f: https://ir.ozone.ru/s3/multimedia-1-i/7222597686.jpg
                      t: >-
                        https://ir.ozone.ru/s3/multimedia-1-i/d100/7222597686.jpg
                      m: >-
                        https://ir.ozone.ru/s3/multimedia-1-i/d250/7222597686.jpg
                sku_first_date: '2025-02-12'
                note: null
                updated: '2026-03-05 20:04:14'
  /items/{id}/categories:
